# ══════════════════════════════════════════════════════════════════════
# params.yml — SINGLE SOURCE OF TRUTH for all analysis parameters
# Notebooks do NOT hardcode numbers found here.
# ══════════════════════════════════════════════════════════════════════

meta:
  project: "crea-anomaly-detection"
  config_version: "2.1"
  random_seed: 42

paths:
  raw_dir: "../data/raw"
  processed_dir: "../data/processed"

# ── Per-country colour palette (consistent across all plots, all notebooks) ──
colors_map:
  China:   "#F5A623"
  Germany: "#378ADD"
  India:   "#E24B4A"
  USA:     "#1D9E75"

# ── Data cleaning ──────────────────────────────────────────────
cleaning:
  sentinel_values: [999, 999.9, 999.99, 9999, -999, -9999]
  min_lat: -90
  max_lat: 90
  min_lon: -180
  max_lon: 180
  null_island_deg: 0.001
  expected_countries: ["China", "Germany", "India", "USA"]

# ── EDA ─────────────────────────────────────────────────────────
eda:
  outage_hours: 72
  missing_attention_pct: 30
  extreme_review_threshold: 500
  implausible_threshold: 1000
  # "Very low value" threshold (µg/m³) — indicates a dead/frozen sensor
  very_low_threshold: 2

# ── Parameter derivation ────────────────────────────────────────
derivation:
  extreme_percentile: 99            # per-country P99 (not a flat 200)
  who_annual_ugm3: 5                # WHO 2021 annual mean guideline
  who_24h_ugm3: 15                  # WHO 2021 24-hour guideline

# ── Filter & split ─────────────────────────────────────
filter:
  min_completeness_pct: 50

# ── Spatial analysis ─────────────────────────────────────────
spatial:
  min_neighbors: 3
  detectable_target_pct: 80
  radius_km:
    default: 50                     # fallback when a country is not listed
    China: 50                       # NN median 4.0km; d=50 → 89.1% detectable
    Germany: 50                     # dense network; d=50 is sufficient
    India: 100                      # more spread out; d=100 needed for coverage
    USA: 150                        # most spread out; d=150 for >=80% detectable

# ── Anomaly detection methods ───────────────────────────────────
tsad:
  # Isolation Forest
  # Empirically validated in NB2 (P99 exceedance sensitivity test, 1.5x-10x thresholds);
  # 0.05 is consistent with the proportion of anomalous stations under a strict definition.
  # See parameter_derivation.json for provenance.
  isolation_forest_contamination: 0.05
  # Spatial Z-score baseline (separate Z-score notebook)
  zscore_window_days: 30
  # |Z| threshold above which a station is considered suspicious.
  # 3.0 = common convention (~99.7% of data within ±3σ for a normal distribution);
  # NEEDS to be validated/derived from data once the Z-score notebook is built.
  zscore_suspicion_threshold: 3.0

# ── BENFORD ──────────────────────────────────────────────────
benford:
  min_obs: 100            # minimum values per station for a stable MAD (Nigrini 2012)
  mad_nonconform: 0.015   # MAD nonconformity threshold (first-digit, Nigrini 2012)
  flag_sd_threshold: 2.0  # flag a station if its Benford score is > 2 SD above the country mean

# ── LOF ──────────────────────────────────────────────────
lof:
  n_neighbors: 20         # number of local neighbors in feature space (Breunig et al. 2000)

# ── FROZEN VALUES ────────────────────────────────────────
frozen:
  min_run_length: 6       # number of consecutive identical observations considered suspicious

# ── SL/SH ─────────────────────────────────────────────────
slsh:
  tukey_r: 1.5            # Tukey test constant (Chen et al. 2018)
  phi_systematic: 0.333  # systematic-behavior threshold (1/3, Chen 2018)
  phi_severe: 0.667      # severe-malfunction threshold (2/3, Chen 2018)